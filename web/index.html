<!DOCTYPE html>
<html lang="en" style="background: transparent !important; background-color: rgba(0,0,0,0) !important;">

<head>
    <meta charset="UTF-8">
    <title>PLRP Radiolist</title>
    <style>
        :root {
            background: transparent !important;
            background-color: rgba(0, 0, 0, 0) !important;
            --pl-radius-lg: 1.25rem;
            --pl-surface: rgba(12, 16, 21, 0.95);
            --pl-surface-gradient: linear-gradient(180deg, rgba(15, 20, 25, 0.92), rgba(10, 14, 20, 0.92));
            --pl-border: rgba(42, 58, 84, 0.8);
            --pl-accent: #1f6feb;
            --pl-accent-soft: #7dcfff;
            --pl-text: rgba(255, 255, 255, 0.85);
            --pl-text-muted: rgba(255, 255, 255, 0.55);
            --pl-shadow-lg: 0 0.85rem 2.25rem rgba(7, 10, 15, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            color: var(--pl-text);
            background: transparent !important;
            background-color: rgba(0, 0, 0, 0) !important;
            user-select: none;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            background-image: none !important;
            pointer-events: none;
        }

        .radio-shell {
            position: absolute;
            top: 4.5vh;
            left: 3vh;
            min-width: 17rem;
            max-width: 20rem;
            display: none;
            pointer-events: none;
            animation: panelIn 0.28s cubic-bezier(.4, 0, .2, 1);
        }

        .radio-panel {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
            background: transparent;
            border: none;
            padding: 0;
        }

        .badge-header {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.4rem 0.9rem;
            border-radius: 0.85rem;
            background: linear-gradient(135deg, rgba(15, 20, 28, 0.95), rgba(9, 13, 19, 0.92));
            border: 1px solid rgba(125, 207, 255, 0.2);
            box-shadow:
                0 0.85rem 2rem rgba(0, 0, 0, 0.6),
                0 0.25rem 0.65rem rgba(31, 111, 235, 0.12),
                inset 0 0 0.25rem rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .badge-header::after {
            content: "";
            position: absolute;
            inset: 0.1rem;
            border-radius: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            pointer-events: none;
        }

        .badge-header__icon {
            width: 1.3rem;
            height: 1.3rem;
            border-radius: 0.45rem;
            background: radial-gradient(circle at 20% 20%, var(--pl-accent), var(--pl-accent-soft));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.75rem;
            box-shadow:
                0 0.35rem 0.75rem rgba(31, 111, 235, 0.4),
                inset 0 0 0.35rem rgba(255, 255, 255, 0.2);
        }

        #radio-frequency {
            font-size: 0.72rem;
            letter-spacing: 0.03rem;
        }

        .badge-header__text {
            display: flex;
            flex-direction: column;
            gap: 0.05rem;
            line-height: 1.1;
        }

        .badge-header__count {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--pl-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07rem;
            font-size: 0.6rem;
        }

        .badge-header__count strong {
            font-size: 0.6rem;
            color: var(--pl-accent-soft);
            letter-spacing: 0.03rem;
        }

        .badge-header__text span {
            text-transform: uppercase;
            font-size: 0.55rem;
            letter-spacing: 0.08rem;
            color: var(--pl-text-muted);
        }

        .badge-header__text strong {
            font-size: 0.95rem;
            background: linear-gradient(135deg, var(--pl-accent), var(--pl-accent-soft));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .radio-body {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin-left: 0.15rem;
        }

        .radio-empty {
            padding: 0.35rem 0;
            border-radius: 0;
            border: none;
            color: var(--pl-text-muted);
            font-size: 0.8rem;
            display: none;
        }

        .radio-empty::after {
            content: "- stand by -";
            font-size: 0.75rem;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
        }

        .radio-list {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.2rem;
        }

        .radio-entry {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.82rem;
            color: var(--pl-text);
            background: rgba(11, 15, 23, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            padding: 0.3rem 0.75rem;
            box-shadow: 0 0.35rem 1.1rem rgba(0, 0, 0, 0.45);
            width: fit-content;
        }

        .radio-entry + .radio-entry {
            margin-top: 0.15rem;
        }

        .radio-entry__pulse {
            width: 0.3rem;
            height: 0.3rem;
            border-radius: 50%;
            background: rgba(125, 207, 255, 0.4);
            animation: idlePulse 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        .radio-entry__info {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            min-width: 0;
            flex: 1;
        }

        .radio-entry__name {
            font-weight: 600;
            letter-spacing: 0.01rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .radio-entry__pill {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            background: rgba(31, 111, 235, 0.18);
            color: var(--pl-accent-soft);
            padding: 0.12rem 0.45rem;
            border-radius: 999px;
            display: none;
        }

        .radio-entry--self {
            color: #fff;
        }

        .radio-entry--self .radio-entry__pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .radio-entry--talking {
            color: var(--pl-accent-soft);
        }

        .radio-entry--talking .radio-entry__pulse {
            background: var(--pl-accent-soft);
            box-shadow: 0 0 0.4rem rgba(31, 111, 235, 0.6);
        }

        .radio-entry--talking .radio-entry__pulse {
            background: var(--pl-accent-soft);
            animation: speaking 0.8s ease-in-out infinite;
        }

        @keyframes panelIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes idlePulse {
            0% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.15);
            }

            100% {
                opacity: 0.4;
                transform: scale(1);
            }
        }

        @keyframes speaking {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(0.9);
                opacity: 0.6;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .radio-shell {
                animation: none;
            }

            .radio-entry__pulse {
                animation: none;
            }
        }
    </style>
</head>

<body style="background: transparent !important; background-color: rgba(0,0,0,0) !important;">
    <div class="radio-shell" id="radio-shell">
        <div class="radio-panel">
            <div class="badge-header">
                <div class="badge-header__icon">
                    <span id="radio-frequency">--</span>
                </div>
                <div class="badge-header__text">
                    <strong id="radio-channel">Radio Net</strong>
                </div>
                <span class="badge-header__count">online <strong id="radio-member-count">0</strong></span>
            </div>
            <div class="radio-body">
                <div class="radio-empty" id="radio-empty">
                    Waiting for traffic
                </div>
                <div class="radio-list" id="radio-list"></div>
            </div>
        </div>
    </div>

    <script>
        const forceTransparentBackground = () => {
            const docEl = document.documentElement;
            const body = document.body;

            if (docEl) {
                docEl.style.setProperty("background", "transparent", "important");
                docEl.style.setProperty("background-color", "rgba(0,0,0,0)", "important");
            }

            if (body) {
                body.style.setProperty("background", "transparent", "important");
                body.style.setProperty("background-color", "rgba(0,0,0,0)", "important");
            }
        };

        forceTransparentBackground();

        let userForcedHidden = false;

        const selectors = {
            shell: document.getElementById("radio-shell"),
            list: document.getElementById("radio-list"),
            empty: document.getElementById("radio-empty"),
            channel: document.getElementById("radio-channel"),
            frequency: document.getElementById("radio-frequency"),
            count: document.getElementById("radio-member-count"),
        };

        let lastFrequencyValue = "--";

        const formatFrequency = (value) => {
            if (value === undefined || value === null) return "--";
            const raw = String(value);
            const numeric = raw.replace(/[^0-9]/g, "");
            if (numeric.length) return numeric.slice(0, 4);
            return raw.slice(0, 4).toUpperCase();
        };

        const updateFrequencyDisplay = (value) => {
            if (!selectors.frequency) return;
            lastFrequencyValue = formatFrequency(value);
            selectors.frequency.textContent = lastFrequencyValue;
        };

        const updateMemberCount = () => {
            if (!selectors.count) return;
            selectors.count.textContent = selectors.list.children.length;
        };

        const refreshEmptyState = () => {
            if (!selectors.empty) return;
            const hasEntries = selectors.list.children.length > 0;
            selectors.empty.style.display = hasEntries ? "none" : "flex";
        };

        refreshEmptyState();

        const setShellVisible = (visible) => {
            if (!selectors.shell) return;
            selectors.shell.style.display = visible ? "block" : "none";
        };

        const ensurePanelVisible = () => {
            const hasEntries = selectors.list.children.length > 0;
            const emptyVisible = selectors.empty && selectors.empty.style.display === "flex";

            if (userForcedHidden) {
                setShellVisible(false);
                return;
            }

            setShellVisible(hasEntries || emptyVisible);
        };

        const upsertRadioEntry = (item) => {
            const elementId = `radio-list-item-${item.radioId}`;
            let entry = document.getElementById(elementId);

            if (!entry) {
                entry = document.createElement("div");
                entry.id = elementId;
                entry.className = "radio-entry";

                const info = document.createElement("div");
                info.className = "radio-entry__info";

                const pulse = document.createElement("span");
                pulse.className = "radio-entry__pulse";
                pulse.setAttribute("aria-hidden", "true");

                const name = document.createElement("span");
                name.className = "radio-entry__name";
                info.appendChild(pulse);
                info.appendChild(name);

                const pill = document.createElement("span");
                pill.className = "radio-entry__pill";
                pill.dataset.pillSelf = "true";
                pill.textContent = "You";

                entry.appendChild(info);
                entry.appendChild(pill);
                if (item.self) {
                    selectors.list.insertBefore(entry, selectors.list.firstChild);
                } else {
                    selectors.list.appendChild(entry);
                }
                updateMemberCount();
            }

            const nameNode = entry.querySelector(".radio-entry__name");
            if (nameNode) {
                nameNode.textContent = item.radioName;
            }

            const pillNode = entry.querySelector("[data-pill-self]");
            const isSelf = !!item.self;
            if (pillNode) {
                pillNode.style.display = isSelf ? "inline-flex" : "none";
            }

            entry.classList.toggle("radio-entry--self", isSelf);

            if (isSelf && selectors.list.firstChild !== entry) {
                selectors.list.insertBefore(entry, selectors.list.firstChild);
            }
        };

        const toggleTalkingState = (radioId, isTalking) => {
            const entry = document.getElementById(`radio-list-item-${radioId}`);
            if (entry) {
                entry.classList.toggle("radio-entry--talking", !!isTalking);
            }
        };

        const removeRadioEntry = (radioId) => {
            const entry = document.getElementById(`radio-list-item-${radioId}`);
            if (entry) {
                selectors.list.removeChild(entry);
                updateMemberCount();
            }
            refreshEmptyState();
            ensurePanelVisible();
        };

        const resetPanel = () => {
            selectors.list.innerHTML = "";
            selectors.channel.textContent = "Radio Net";
            updateFrequencyDisplay("--");
            updateMemberCount();
            refreshEmptyState();
            setShellVisible(false);
        };

        window.addEventListener("message", (event) => {
            const item = event.data || {};

            if (item.radioId != null) {
                if (item.channel) {
                    selectors.channel.textContent = item.channel;
                }

                if (item.channelFrequency !== undefined) {
                    updateFrequencyDisplay(item.channelFrequency);
                } else if (item.channel && lastFrequencyValue === "--") {
                    updateFrequencyDisplay(item.channel);
                }

                if (item.radioName != null) {
                    upsertRadioEntry(item);
                    refreshEmptyState();
                } else if (item.radioTalking != null) {
                    toggleTalkingState(item.radioId, item.radioTalking);
                } else {
                    removeRadioEntry(item.radioId);
                }

                ensurePanelVisible();
            }

            if (item.clearRadioList) {
                resetPanel();
            }

            if (item.changeVisibility) {
                if (item.visible === true) {
                    userForcedHidden = false;
                    ensurePanelVisible();
                } else {
                    userForcedHidden = true;
                    setShellVisible(false);
                }
            }
        });
    </script>
</body>

</html>
